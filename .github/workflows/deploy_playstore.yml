name: Build and deploy to playStore

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > ./keystore.jks

      - name: Set up local.properties
        run: |
          echo "storeFile=./keystore.jks" >> local.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> local.properties

      - name: Grant rights to gradlew
        run: chmod +x ./gradlew

      - name: Build Release AAB
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Upload Unsigned AAB
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload Mapping File
        uses: actions/upload-artifact@v4
        with:
          name: mapping-file
          path: app/build/outputs/mapping/release/mapping.txt

  sign:
    name: Sign AAB
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Unsigned AAB
        uses: actions/download-artifact@v4
        with:
          name: unsigned-aab
          path: app/build/outputs/bundle/release

      - name: Sign AAB
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: ${{ steps.sign.outputs.signedReleaseFile }}
          if-no-files-found: error

  deploy:
    name: Deploy to Play Store
    needs: [build, sign]
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Signed AAB
        uses: actions/download-artifact@v4
        with:
          name: signed-aab
          path: app/build/outputs/bundle/release

      - name: Download Mapping File
        uses: actions/download-artifact@v4
        with:
          name: mapping-file
          path: app/build/outputs/mapping/release

      - name: Create service_account.json
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Deploy to Play Store
        id: deploy
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: service_account.json
          packageName: com.muchogoc.blogapp
          status: completed
          releaseFiles: app/build/outputs/bundle/release/*.aab
          whatsNewDirectory: release-notes
          inAppUpdatePriority: 4
          mappingFile: app/build/outputs/mapping/release/mapping.txt
          track: internal

      - name: Slack Notification
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: always()

